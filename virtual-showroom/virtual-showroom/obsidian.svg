<svg viewBox="0 0 400 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cupGradobsidian" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15161A" stop-opacity="1"/>
      <stop offset="1" stop-color="#15161A" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="bandGradobsidian" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101114" stop-opacity="1"/>
      <stop offset="1" stop-color="#101114" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="sheenobsidian" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g >
    <g>
      <!-- headband -->
      <path d="M 70 190 Q 70 40 200 40 Q 330 40 330 190"
            fill="none" stroke="url(#bandGradobsidian)" stroke-width="26"
            stroke-linecap="round" />
      <path d="M 70 190 Q 70 40 200 40 Q 330 40 330 190"
            fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="6"
            stroke-linecap="round" />

      <!-- left cup -->
      <g>
        <ellipse cx="68" cy="230" rx="46" ry="62" fill="url(#cupGradobsidian)" />
        <ellipse cx="68" cy="230" rx="46" ry="62" fill="none" stroke="#39FF8E" stroke-opacity="0.35" stroke-width="2"/>
        <ellipse cx="68" cy="230" rx="30" ry="44" fill="#0A0A0C" />
        <ellipse cx="55" cy="205" rx="16" ry="20" fill="url(#sheenobsidian)" />
      </g>

      <!-- right cup -->
      <g>
        <ellipse cx="332" cy="230" rx="46" ry="62" fill="url(#cupGradobsidian)" />
        <ellipse cx="332" cy="230" rx="46" ry="62" fill="none" stroke="#39FF8E" stroke-opacity="0.35" stroke-width="2"/>
        <ellipse cx="332" cy="230" rx="30" ry="44" fill="#0A0A0C" />
        <ellipse cx="319" cy="205" rx="16" ry="20" fill="url(#sheenobsidian)" />
        <circle cx="332" cy="230" r="5" fill="#39FF8E" opacity="0.9" />
      </g>

      <!-- yokes -->
      <path d="M 68 168 L 68 195" stroke="#101114" stroke-width="10" stroke-linecap="round"/>
      <path d="M 332 168 L 332 195" stroke="#101114" stroke-width="10" stroke-linecap="round"/>

      
    </g>
  </g>
</svg>